{% extends "base.html" %} {% block title %}Generate License - ShadowCap{%
endblock %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h5><i class="bi bi-key"></i> Generate New License</h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
          <div class="mb-3">
            <label class="form-label">Machine ID</label>
            <input
              type="text"
              name="machine_id"
              class="form-control"
              required
              placeholder="Enter client machine ID"
            />
            <small class="text-muted"
              >Run the client with --get-id to get the machine ID</small
            >
          </div>
          <div class="mb-3">
            <label class="form-label">Expiry (Days)</label>
            <input
              type="number"
              name="expiry_days"
              class="form-control"
              value="365"
              min="1"
            />
          </div>
          <div class="mb-3">
            <label class="form-label">Features</label>
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="features"
                value="recording"
                checked
              />
              <label class="form-check-label">Recording</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                name="features"
                value="upload"
                checked
              />
              <label class="form-check-label">Upload</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-key-fill"></i> Generate License
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
