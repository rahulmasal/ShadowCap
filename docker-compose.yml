services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: screenrecorder-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist data outside container
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./licenses:/app/licenses
      - ./keys:/app/keys
    environment:
      # Required: MUST be set in .env or environment — container will NOT start without them
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      # Server configuration
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/screenrecorder.db}
      - UPLOAD_FOLDER=/app/uploads
      - LICENSE_FOLDER=/app/licenses
      - KEYS_FOLDER=/app/keys
      # Optional: Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Optional: Rate limiting
      - RATE_LIMIT=${RATE_LIMIT:-true}
      # Optional: Redis for distributed rate limiting
      - RATE_LIMIT_STORAGE_URI=${RATE_LIMIT_STORAGE_URI:-}
      # Optional: HTTPS enforcement (set to true in production with proper SSL)
      - ENFORCE_HTTPS=${ENFORCE_HTTPS:-false}
      # Optional: Private key encryption passphrase
      - KEY_PASSPHRASE=${KEY_PASSPHRASE:-}
      # Optional: Retention policies (days, 0 = keep forever)
      - AUDIT_LOG_RETENTION_DAYS=${AUDIT_LOG_RETENTION_DAYS:-90}
      - VIDEO_RETENTION_DAYS=${VIDEO_RETENTION_DAYS:-0}
      - VIDEO_DISK_LIMIT_MB=${VIDEO_DISK_LIMIT_MB:-0}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    networks:
      - screenrecorder

  # PostgreSQL database for production (replaces SQLite)
  postgres:
    image: postgres:16-alpine
    container_name: screenrecorder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-screenrecorder}
      POSTGRES_USER: ${POSTGRES_USER:-screenrecorder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set for PostgreSQL}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-screenrecorder}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - screenrecorder
    # Uncomment to expose PostgreSQL port for external access
    # ports:
    #   - "5432:5432"

  # Optional: Redis for distributed rate limiting and session storage
  redis:
    image: redis:7-alpine
    container_name: screenrecorder-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - screenrecorder
    # Uncomment to expose Redis port for external access
    # ports:
    #   - "6379:6379"

  # Optional: Nginx reverse proxy for production
  # Uncomment this section for production deployment with SSL
  # nginx:
  #   image: nginx:alpine
  #   container_name: screenrecorder-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     server:
  #       condition: service_healthy
  #   networks:
  #     - screenrecorder

networks:
  screenrecorder:
    driver: bridge

volumes:
  pgdata:
    driver: local
