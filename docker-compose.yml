version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: screenrecorder-server
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DATABASE_URL=sqlite:///data/screenrecorder.db
      - UPLOAD_FOLDER=/app/uploads
      - LICENSE_FOLDER=/app/licenses
      - KEYS_FOLDER=/app/keys
      - CLIENTS_FOLDER=/app/clients
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./licenses:/app/licenses
      - ./keys:/app/keys
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: screenrecorder-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
    profiles:
      - production
    restart: unless-stopped

volumes:
  data:
  uploads:
  licenses:
  keys:
